<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 🎉</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            overflow: hidden;
            text-align: center;
            color: white;
        }

        #app {
            padding-top: 80px;
            position: relative;
            z-index: 2;
        }

        img {
            width: 150px;
        }

        h1 {
            font-size: 28px;
            padding: 0 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
        }

        #yes {
            background: #ff4d6d;
            color: white;
        }

        #no {
            background: #555;
            color: white;
            position: absolute;
        }

        /* 🎉 confetti */
        #ribbon-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .ribbon {
            position: absolute;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
    </style>
</head>

<body>

<div id="ribbon-container"></div>

<audio id="music" autoplay loop>
    <source src="nastelbom-happy-birthday-471481.mp3" type="audio/mpeg">
</audio>

<div id="app">
    <img id="gambar" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExaXp6aXJiYWdidXZlcTQwdGUxaXgzeGJrMDA1dHJlYnNwa3NmaWQ1ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/U0475P2diaBOsNOq22/giphy.gif">
    <h1 id="text">Eh aku ada sesuatu buat kamu </h1>
    <button onclick="nextText()">apa tu? ➡️</button>
</div>

<script>

let step = 0;

let messages = [
    "Kepoo yaa?",
    "kayaknya ada yang lagi ulang tahun ni 🎉",
    "Oalahh Farrah, diem diem bae cuyy"
];

let images = [
    "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExazRicnAycmlpMTY2bG44aHRlbjI3bTkzY29teHF2MXUzdjZjc3BkdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/9w7YtTycjeLzW8V6io/giphy.gif",
    "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
    "https://media.tenor.com/islKHV6ibh0AAAAM/kitty-cat.gif"
];

// 🎉 confetti
function createRibbon() {
    const container = document.getElementById("ribbon-container");
    const emojis = ["🎉","🎂","🎁","✨"];

    for (let i = 0; i < 50; i++) {
        let ribbon = document.createElement("div");
        ribbon.classList.add("ribbon");

        ribbon.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        ribbon.style.left = Math.random() * window.innerWidth + "px";
        ribbon.style.animationDuration = (Math.random() * 3 + 2) + "s";

        container.appendChild(ribbon);
    }
}

window.onload = createRibbon;

function nextText() {
    if (step < messages.length) {
        document.getElementById("text").innerText = messages[step];
        document.getElementById("gambar").src = images[step];
        step++;
    } else {
        showGift();
    }
}

// 🎁 tampil kado
function showGift() {
    document.getElementById("app").innerHTML = `
        <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif">
        <h1>Aku ada hadiah buat kamu 🎁</h1>
        <button onclick="openGift()">Buka kado 🎁</button>
    `;
}

// 🎁 buka kado
function openGift() {
    document.getElementById("app").innerHTML = `
        <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTBmYWhsZXplNzcyMW15ODZvdG5mYXVnY2cwcGtsN3kwdXk1MDg2MyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/jfKiMjWolBzuWkdbw0/giphy.webp">
        <h1>🎁 Hadiahnya adalah...</h1>
        <p style="font-size:20px;">Angin doang 😭</p>
        <p>Wahahaha ketipu ya?</p>

        <button onclick="realGift()">Serius dong </button>
    `;
}

// 🎂 hadiah beneran
function realGift() {
    document.getElementById("app").innerHTML = `
        <img src="https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif">
        <h1>🎂 HAPPY BIRTHDAY 🎉</h1>
        <p>
            Canda oi <br><br>
            Semoga panjang umur, sehat selalu <br>
            Semoga makin sukses dan bahagia <br>
            Amiin
        </p>

        <button onclick="showTreat()">Lanjut ➡️</button>
    `;
}

// 😈 minta traktir
function showTreat() {
    document.getElementById("app").innerHTML = `
        <img src="https://media3.giphy.com/media/11sBLVxNs7v6WA/giphy.gif">
        <h1>Karena ulang tahun...</h1>
        <p>Traktir kebab lah ya</p>

        <button id="yes">Oke gas </button>
        <button id="no">Gak </button>
    `;

    let noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", function() {
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 50);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    document.getElementById("yes").onclick = finalPage;
}

// 🎉 ending
function finalPage() {
    document.getElementById("app").innerHTML = `
        <img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">
        <h1>Asikk wkwkw</h1>
        <p>Dahlah</p>
    `;
}

// 🔊 autoplay fix
document.body.addEventListener("click", function() {
    let music = document.getElementById("music");
    music.volume = 0.3;
    music.play();
}, { once: true });

</script>

</body>
</html>
