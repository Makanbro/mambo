<script>
let step = 0;

let messages = [
    "Kepoo yaa?",
    "kayaknya ada yang lagi ulang tahun ni 🎉",
    "Oalahh Farrah, diem diem bae cuyy"
];

let images = [
    "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExazRicnAycmlpMTY2bG44aHRlbjI3bTkzY29teHF2MXUzdjZjc3BkdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/9w7YtTycjeLzW8V6io/giphy.gif",
    "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
    "https://media.tenor.com/islKHV6ibh0AAAAM/kitty-cat.gif"
];

// 🎉 confetti
function createRibbon() {
    const container = document.getElementById("ribbon-container");
    const emojis = ["🎉","🎂","🎁","✨"];

    for (let i = 0; i < 50; i++) {
        let ribbon = document.createElement("div");
        ribbon.classList.add("ribbon");

        ribbon.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        ribbon.style.left = Math.random() * window.innerWidth + "px";
        ribbon.style.animationDuration = (Math.random() * 3 + 2) + "s";

        container.appendChild(ribbon);
    }
}
createRibbon();

function nextText() {
    if (step < messages.length) {
        document.getElementById("text").innerText = messages[step];
        document.getElementById("gambar").src = images[step];
        step++;
    } else {
        showGift();
    }
}

// 🎁 tampil kado
function showGift() {
    document.getElementById("app").innerHTML = `
        <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif">
        <h1>Aku ada hadiah buat kamu 🎁</h1>
        <button onclick="openGift()">Buka kado 🎁</button>
    `;
}

// 🎁 buka kado (FIX DI SINI)
function openGift() {
    document.getElementById("app").innerHTML = `
        <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTBmYWhsZXplNzcyMW15ODZvdG5mYXVnY2cwcGtsN3kwdXk1MDg2MyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/jfKiMjWolBzuWkdbw0/giphy.webp">
        <h1>🎁 Hadiahnya adalah...</h1>
        <p style="font-size:20px;">Angin doang 😭</p>
        <p>Wahahaha ketipu ya?</p>

        <button onclick="realGift()">Serius dong </button>
    `;
}

// 🎂 hadiah beneran
function realGift() {
    document.getElementById("app").innerHTML = `
        <img src="https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif">
        <h1>🎂 HAPPY BIRTHDAY 🎉</h1>
        <p>
            Canda oi <br><br>
            Semoga panjang umur, sehat selalu <br>
            Semoga makin sukses dan bahagia <br>
            Amiin
        </p>

        <button onclick="showTreat()">Lanjut ➡️</button>
    `;
}

// 😈 minta traktir
function showTreat() {
    document.getElementById("app").innerHTML = `
        <img src="https://media3.giphy.com/media/11sBLVxNs7v6WA/giphy.gif">
        <h1>Karena ulang tahun...</h1>
        <p>Traktir kebab lah ya</p>

        <button id="yes">Oke gas </button>
        <button id="no">Gak </button>
    `;

    let noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", function() {
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 50);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    document.getElementById("yes").onclick = finalPage;
}

// 🎉 ending
function finalPage() {
    document.getElementById("app").innerHTML = `
        <img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">
        <h1>Asikk wkwkw</h1>
        <p>Dahlah</p>
    `;
}

// autoplay fix
document.body.addEventListener("click", function() {
    let music = document.getElementById("music");
    music.volume = 0.3;
    music.play();
}, { once: true });
</script>
